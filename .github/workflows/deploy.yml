name: Deploy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/processoriented/wordle-solver

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

  build-and-push:
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.OLYMPIA_SSH_KEY }}

      - name: Add Olympia to known hosts
        run: ssh-keyscan -H "${{ secrets.OLYMPIA_HOST }}" >> ~/.ssh/known_hosts

      - name: Install compose file on Olympia
        run: |
          ssh "${{ secrets.OLYMPIA_USER }}@${{ secrets.OLYMPIA_HOST }}" 'mkdir -p ~/apps/wordle-solver'
          scp docker-compose.yml "${{ secrets.OLYMPIA_USER }}@${{ secrets.OLYMPIA_HOST }}:~/apps/wordle-solver/docker-compose.yml"

      - name: Deploy container
        run: |
          ssh "${{ secrets.OLYMPIA_USER }}@${{ secrets.OLYMPIA_HOST }}" <<EOF
            set -euo pipefail
            cd ~/apps/wordle-solver
            export IMAGE_TAG=${{ github.ref_name }}
            docker pull ${IMAGE_NAME}:\${IMAGE_TAG}
            docker stop wordle-solver 2>/dev/null || true
            docker rm wordle-solver 2>/dev/null || true
            docker compose up -d
            sleep 2
            curl -sf http://127.0.0.1:3010/wordle/ > /dev/null
            echo "Deployed ${IMAGE_NAME}:\${IMAGE_TAG}"
          EOF
